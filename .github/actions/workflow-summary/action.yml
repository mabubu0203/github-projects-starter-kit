name: 'Workflow Summary'
description: '成功・失敗の共通ワークフローサマリー出力'
inputs:
  status:
    description: 'ワークフローの結果ステータス（success / failure）'
    required: true
  job-results:
    description: '各ジョブの結果（JSON形式、複数ジョブ時に使用）'
    required: false
    default: ''
  project-owner:
    description: 'Project の所有者（省略可）'
    required: false
    default: ''
  project-number:
    description: '対象 Project の Number（省略可）'
    required: false
    default: ''
runs:
  using: composite
  steps:
    - shell: bash
      env:
        STATUS: ${{ inputs.status }}
        JOB_RESULTS: ${{ inputs.job-results }}
        PROJECT_OWNER: ${{ inputs.project-owner }}
        PROJECT_NUMBER: ${{ inputs.project-number }}
      run: |
        # Markdownテーブル用エスケープ: | を \| に、改行をスペースに置換
        escape_md() {
          printf '%s' "$1" | tr '\n' ' ' | sed 's/|/\\|/g'
        }

        if [[ "${STATUS}" == "success" ]]; then
          ICON=":white_check_mark:"
          TITLE="ワークフロー成功レポート"
        else
          ICON=":x:"
          TITLE="ワークフロー失敗レポート"
        fi

        {
          echo "## ${ICON} ${TITLE}"
          echo ""
          echo "| 項目 | 値 |"
          echo "|------|-----|"
          echo "| ワークフロー名 | \`$(escape_md "${{ github.workflow }}")\` |"
          echo "| ブランチ | \`$(escape_md "${{ github.ref_name }}")\` |"
          echo "| コミット | \`${GITHUB_SHA::7}\` |"
          echo "| 実行者 | [$(escape_md "${{ github.actor }}") ](${{ github.server_url }}/${{ github.actor }}) |"
          echo "| 実行URL | [Actions Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
          echo "| gh バージョン | \`$(gh --version | head -1)\` |"
          echo "| jq バージョン | \`$(jq --version)\` |"
          if [[ -n "${PROJECT_OWNER}" ]]; then
            echo "| Project Owner | \`$(escape_md "${PROJECT_OWNER}")\` |"
          fi
          if [[ -n "${PROJECT_NUMBER}" ]]; then
            echo "| Project Number | ${PROJECT_NUMBER} |"
          fi

          if [[ -n "${JOB_RESULTS}" ]]; then
            echo ""
            echo "### ジョブ結果"
            echo ""
            echo "| ジョブ名 | 結果 |"
            echo "|----------|------|"
            if command -v jq >/dev/null 2>&1 && echo "${JOB_RESULTS}" | jq empty 2>/dev/null; then
              echo "${JOB_RESULTS}" | jq -r 'to_entries[] | "| \(.key) | \(.value) |"'
            else
              echo "| (解析不可) | ${JOB_RESULTS} |"
            fi
          fi

          if [[ "${STATUS}" == "failure" ]]; then
            # フォークの場合はフォーク元リポジトリを取得
            UPSTREAM_REPO=$(gh api "repos/${{ github.repository }}" --jq 'select(.fork) | .parent.full_name' 2>/dev/null || true)
            if [[ -n "${UPSTREAM_REPO}" ]]; then
              UPSTREAM_URL="${{ github.server_url }}/${UPSTREAM_REPO}"
            else
              UPSTREAM_URL="${{ github.server_url }}/${{ github.repository }}"
            fi
            echo ""
            echo "### 次のアクション"
            echo ""
            if [[ -n "${UPSTREAM_REPO}" ]]; then
              echo "> :warning: このリポジトリはフォークです。フォーク元と同期されていない可能性があります。"
              echo "> 最新の状態に更新するには、GitHub の **Sync fork** またはローカルで \`git fetch upstream && git merge upstream/main\` を実行してください。"
              echo ""
            fi
            echo "問題が解決しない場合は、以下から報告してください："
            echo "- [Issue を作成する](${UPSTREAM_URL}/issues/new)"
            echo "- [Discussion を作成する](${UPSTREAM_URL}/discussions/new)"
          fi
        } >> "$GITHUB_STEP_SUMMARY"
