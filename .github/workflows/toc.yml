# ---------------------------------------------------------
# TOC Generator による目次の自動生成
# ---------------------------------------------------------
# このワークフローは technote-space/toc-generator を使用して、
# マークダウンファイルの目次（Table of Contents）を自動生成します。
#
# mainブランチへのpush時にトリガーされ、目次を更新するPRを
# 自動作成します。目次の変更を反映するには、作成されたPRを
# マージする必要があります。
#
# 設定:
#   - 対象ファイル: README.md, docs/**/*.md, .github/**/*.md
#   - 見出しレベル: H2（##）のみ
#   - 出力形式: HTML（<details> + <ul><li>）
#     GitHub Pages（Jekyll）では <details> 内の Markdown リストが
#     正しくレンダリングされないため、CUSTOM_MODE で HTML 出力する
#
# secrets.PROJECT_PAT には GitHub の Personal Access Token を設定します。
# 他のワークフローと同じトークンを使用しています。
# PATの形式（ghp_ または github_pat_ で始まる）を検証し、
# 無効な値の場合はジョブをスキップします。
# ---------------------------------------------------------
on:
  push:
    branches:
      - main
    paths:
      - README.md
      - docs/**/*.md
      - .github/**/*.md

name: TOC Generator

jobs:
  generateTOC:
    name: TOC Generator
    runs-on: ubuntu-latest
    env:
      PROJECT_PAT: ${{ secrets.PROJECT_PAT }}
    steps:
      - uses: technote-space/toc-generator@v4.3.1
        if: ${{ startsWith(env.PROJECT_PAT, 'ghp_') || startsWith(env.PROJECT_PAT, 'github_pat_') }}
        with:
          GITHUB_TOKEN: ${{ secrets.PROJECT_PAT }}
          TARGET_PATHS: README.md,docs/**/*.md,.github/**/*.md
          MAX_HEADER_LEVEL: 2
          CUSTOM_MODE: true
          CUSTOM_TEMPLATE: "<details><summary>（ここをクリック）目次</summary>\n<ul>\n${ITEMS}\n</ul>\n</details>"
          ITEM_TEMPLATE: '<li><a href="${LINK}">${TEXT}</a></li>'
          SEPARATOR: "\n"
          TOC_TITLE: ""
          CREATE_PR: true
