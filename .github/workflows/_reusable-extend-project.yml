# ---------------------------------------------------------
# secrets.PROJECT_PAT には GitHub の Personal Access Token を設定します。
# PATの形式（ghp_ または github_pat_ で始まる）を検証し、
# 無効な値の場合はジョブをスキップします。
# ---------------------------------------------------------
name: "Project 拡張（再利用可能）"

on:
  workflow_call:
    inputs:
      project_number:
        description: "対象 Project の Number"
        required: true
        type: number
    secrets:
      PROJECT_PAT:
        description: "GitHub PAT（Projects 操作権限が必要）"
        required: true

jobs:
  extend-project:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PROJECT_PAT }}
      PROJECT_OWNER: ${{ github.repository_owner }}
      PROJECT_NUMBER: ${{ inputs.project_number }}
      PROJECT_PAT: ${{ secrets.PROJECT_PAT }}
    # 前提: ubuntu-latest には gh (GitHub CLI) と jq がプリインストール済み
    # スクリプト内の require_command チェックはローカル実行時の UX 向上目的で残している
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        if: ${{ startsWith(env.PROJECT_PAT, 'ghp_') || startsWith(env.PROJECT_PAT, 'github_pat_') }}

      - name: ステータスカラムを設定
        if: ${{ startsWith(env.PROJECT_PAT, 'ghp_') || startsWith(env.PROJECT_PAT, 'github_pat_') }}
        run: bash scripts/setup-project-status.sh

      - name: カスタムフィールドを作成
        if: ${{ startsWith(env.PROJECT_PAT, 'ghp_') || startsWith(env.PROJECT_PAT, 'github_pat_') }}
        run: bash scripts/setup-project-fields.sh

      - name: View を作成
        if: ${{ startsWith(env.PROJECT_PAT, 'ghp_') || startsWith(env.PROJECT_PAT, 'github_pat_') }}
        run: bash scripts/setup-project-views.sh
