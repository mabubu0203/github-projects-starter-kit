name: "① GitHub Project 新規作成"

on:
  workflow_dispatch:
    inputs:
      project_title:
        description: "作成する Project のタイトル"
        required: true
        type: string
      visibility:
        description: "Project の公開範囲"
        required: true
        type: choice
        default: "PRIVATE"
        options:
          - "PRIVATE"
          - "PUBLIC"

permissions:
  contents: read

jobs:
  create-project:
    runs-on: ubuntu-latest
    outputs:
      project_number: ${{ steps.create.outputs.project_number }}
    env:
      GH_TOKEN: ${{ secrets.PROJECT_PAT }}
      PROJECT_OWNER: ${{ github.repository_owner }}
    # 前提: ubuntu-latest には gh (GitHub CLI) と jq がプリインストール済み
    # スクリプト内の require_command チェックはローカル実行時の UX 向上目的で残している
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Project を作成
        id: create
        env:
          PROJECT_TITLE: ${{ inputs.project_title }}
          PROJECT_VISIBILITY: ${{ inputs.visibility }}
        run: |
          chmod +x scripts/setup-github-project.sh
          bash scripts/setup-github-project.sh

  extend-project:
    needs: create-project
    uses: ./.github/workflows/_reusable-extend-project.yml
    with:
      project_number: ${{ fromJSON(needs.create-project.outputs.project_number) }}
    secrets:
      PROJECT_PAT: ${{ secrets.PROJECT_PAT }}
