name: "⑧ プロジェクトサマリーレポート"

on:
  workflow_dispatch:
    inputs:
      project_number:
        description: "Project の Number"
        required: true
        type: number

permissions:
  contents: read

jobs:
  generate-summary-report:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PROJECT_PAT }}
      PROJECT_OWNER: ${{ github.repository_owner }}
      PROJECT_NUMBER: ${{ inputs.project_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: サマリーレポート生成
        run: |
          chmod +x scripts/generate-summary-report.sh
          bash scripts/generate-summary-report.sh

      - name: アーティファクトをアップロード
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: summary-report-${{ inputs.project_number }}
          path: report-*.json
          if-no-files-found: ignore
          retention-days: 90

  workflow-summary-failure:
    needs: [generate-summary-report]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: 失敗サマリーを出力
        uses: ./.github/actions/workflow-summary
        with:
          status: failure
          project-owner: ${{ github.repository_owner }}
          project-number: ${{ inputs.project_number }}
          job-results: |
            {"generate-summary-report": "${{ needs.generate-summary-report.result }}"}

  workflow-summary-success:
    needs: [generate-summary-report]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: 成功サマリーを出力
        uses: ./.github/actions/workflow-summary
        with:
          status: success
          project-owner: ${{ github.repository_owner }}
          project-number: ${{ inputs.project_number }}
          job-results: |
            {"generate-summary-report": "${{ needs.generate-summary-report.result }}"}
