name: "③ Issue/PR 一括紐付け"

on:
  workflow_dispatch:
    inputs:
      project_number:
        description: "対象 Project の Number"
        required: true
        type: string
      target_repo:
        description: "対象リポジトリ（owner/repo 形式、1回の実行で1リポジトリ）"
        required: true
        type: string
      include_issues:
        description: "Issue を追加対象にする"
        required: true
        type: boolean
        default: true
      include_prs:
        description: "Pull Request を追加対象にする"
        required: true
        type: boolean
        default: true
      item_state:
        description: "取得するアイテムの状態"
        required: true
        type: choice
        options:
          - open
          - closed
          - all
        default: "open"
      item_label:
        description: "絞り込みラベル（指定ラベルの Issue/PR のみ追加、省略可）"
        required: false
        type: string

permissions:
  contents: read

jobs:
  add-items:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PROJECT_PAT }}
      PROJECT_OWNER: ${{ github.repository_owner }}
      PROJECT_NUMBER: ${{ inputs.project_number }}
    # 前提: ubuntu-latest には gh (GitHub CLI) と jq がプリインストール済み
    # スクリプト内の require_command チェックはローカル実行時の UX 向上目的で残している
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Issue/PR を Project に追加
        env:
          TARGET_REPO: ${{ inputs.target_repo }}
          INCLUDE_ISSUES: ${{ inputs.include_issues }}
          INCLUDE_PRS: ${{ inputs.include_prs }}
          ITEM_STATE: ${{ inputs.item_state }}
          ITEM_LABEL: ${{ inputs.item_label }}
        run: |
          chmod +x scripts/add-items-to-project.sh
          bash scripts/add-items-to-project.sh
