# ---------------------------------------------------------
# secrets.PROJECT_PAT には GitHub の Personal Access Token を設定します。
# PATの形式（ghp_ または github_pat_ で始まる）を検証し、
# 無効な値の場合はジョブをスキップします。
# 実際の検証は _reusable-extend-project.yml 内で行われます。
# ---------------------------------------------------------
name: "② GitHub Project 拡張"

on:
  workflow_dispatch:
    inputs:
      project_number:
        description: "対象 Project の Number"
        required: true
        type: number

permissions:
  contents: read

jobs:
  extend-project:
    uses: ./.github/workflows/_reusable-extend-project.yml
    with:
      project_number: ${{ inputs.project_number }}
    secrets:
      PROJECT_PAT: ${{ secrets.PROJECT_PAT }}

  workflow-summary-failure:
    needs: [extend-project]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: 失敗サマリーを出力
        uses: ./.github/actions/workflow-summary
        with:
          status: failure
          project-owner: ${{ github.repository_owner }}
          project-number: ${{ inputs.project_number }}
          job-results: |
            {"extend-project": "${{ needs.extend-project.result }}"}

  workflow-summary-success:
    needs: [extend-project]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: 成功サマリーを出力
        uses: ./.github/actions/workflow-summary
        with:
          status: success
          project-owner: ${{ github.repository_owner }}
          project-number: ${{ inputs.project_number }}
          job-results: |
            {"extend-project": "${{ needs.extend-project.result }}"}
