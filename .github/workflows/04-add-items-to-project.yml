name: "④ Issue/PR 一括紐付け"

on:
  workflow_dispatch:
    inputs:
      project_number:
        description: "対象 Project の Number"
        required: true
        type: number
      target_repo:
        description: "対象リポジトリ（owner/repo 形式、1回の実行で1リポジトリ）"
        required: true
        type: string
      item_type:
        description: "対象アイテムの種別"
        required: true
        type: choice
        options:
          - all
          - issues
          - prs
        default: "all"
      item_state:
        description: "取得するアイテムの状態"
        required: true
        type: choice
        options:
          - open
          - closed
          - all
        default: "open"
      item_label:
        description: "絞り込みラベル（指定ラベルの Issue/PR のみ追加、省略可）"
        required: false
        type: string

permissions:
  contents: read

jobs:
  add-items:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PROJECT_PAT }}
      PROJECT_OWNER: ${{ github.repository_owner }}
      PROJECT_NUMBER: ${{ inputs.project_number }}
    # 前提: ubuntu-latest には gh (GitHub CLI) と jq がプリインストール済み
    # スクリプト内の require_command チェックはローカル実行時の UX 向上目的で残している
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Issue/PR を Project に追加
        env:
          TARGET_REPO: ${{ inputs.target_repo }}
          ITEM_TYPE: ${{ inputs.item_type }}
          ITEM_STATE: ${{ inputs.item_state }}
          ITEM_LABEL: ${{ inputs.item_label }}
        run: |
          chmod +x scripts/add-items-to-project.sh
          bash scripts/add-items-to-project.sh

  workflow-summary-failure:
    needs: [add-items]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: 失敗サマリーを出力
        uses: ./.github/actions/workflow-summary
        with:
          status: failure
          project-owner: ${{ github.repository_owner }}
          project-number: ${{ inputs.project_number }}
          job-results: |
            {"add-items": "${{ needs.add-items.result }}"}

  workflow-summary-success:
    needs: [add-items]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: 成功サマリーを出力
        uses: ./.github/actions/workflow-summary
        with:
          status: success
          project-owner: ${{ github.repository_owner }}
          project-number: ${{ inputs.project_number }}
          job-results: |
            {"add-items": "${{ needs.add-items.result }}"}
