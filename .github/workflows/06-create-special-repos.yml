# ---------------------------------------------------------
# secrets.PROJECT_PAT には GitHub の Personal Access Token を設定します。
# PAT の形式（ghp_ または github_pat_ で始まる）を検証し、
# 無効な値の場合はステップをスキップします。
# ---------------------------------------------------------
name: "⑥ 🏗️ 特殊リポジトリ一括作成"

on:
  workflow_dispatch:
    inputs:
      project_owner:
        description: "対象のオーナー（個人アカウントまたは Organization 名）"
        required: true
        type: string

permissions:
  contents: read

jobs:
  create-special-repos:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PROJECT_PAT }}
      PROJECT_OWNER: ${{ inputs.project_owner }}
      PROJECT_PAT: ${{ secrets.PROJECT_PAT }}
    # 前提: ubuntu-latest には gh (GitHub CLI) と jq がプリインストール済み
    # スクリプト内の require_command チェックはローカル実行時の UX 向上目的で残している
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: オーナータイプを判定してスクリプトを実行
        if: ${{ startsWith(env.PROJECT_PAT, 'ghp_') || startsWith(env.PROJECT_PAT, 'github_pat_') }}
        run: |
          # トリム（前後の空白のみ削除、内部空白は保持）
          PROJECT_OWNER="$(echo "$PROJECT_OWNER" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

          # オーナータイプを判定
          OWNER_TYPE=$(gh api "users/${PROJECT_OWNER}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --jq '.type')

          if [[ "${OWNER_TYPE}" == "User" ]]; then
            echo "個人アカウントとして検出: ${PROJECT_OWNER}"
            bash scripts/create-special-repos-user.sh
          elif [[ "${OWNER_TYPE}" == "Organization" ]]; then
            echo "Organization として検出: ${PROJECT_OWNER}"
            bash scripts/create-special-repos-org.sh
          else
            echo "::error::不明なオーナータイプ: ${OWNER_TYPE}"
            exit 1
          fi

  workflow-summary-failure:
    needs: [create-special-repos]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: 失敗サマリーを出力
        uses: ./.github/actions/workflow-summary
        with:
          status: failure
          project-owner: ${{ inputs.project_owner }}
          job-results: |
            {"create-special-repos": "${{ needs.create-special-repos.result }}"}

  workflow-summary-success:
    needs: [create-special-repos]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: 成功サマリーを出力
        uses: ./.github/actions/workflow-summary
        with:
          status: success
          project-owner: ${{ inputs.project_owner }}
          job-results: |
            {"create-special-repos": "${{ needs.create-special-repos.result }}"}
