# ---------------------------------------------------------
# secrets.PROJECT_PAT には GitHub の Personal Access Token を設定します。
# PAT の形式（ghp_ または github_pat_ で始まる）を検証し、
# 無効な値の場合はステップをスキップします。
# ---------------------------------------------------------
name: "⑥ Issue/PR 一括紐付け"

on:
  workflow_dispatch:
    inputs:
      project_number:
        description: "対象 Project の Number"
        required: true
        type: number
      target_repo:
        description: "対象 Repository（owner/repo 形式、1 回の実行で 1 Repository）"
        required: true
        type: string
      item_type:
        description: "対象 Item の種別"
        required: true
        type: choice
        options:
          - all
          - issues
          - prs
        default: "all"
      item_state:
        description: "取得する Item の状態"
        required: true
        type: choice
        options:
          - open
          - closed
          - all
        default: "open"
      item_label:
        description: "絞り込みラベル（指定ラベルの Issue/PR のみ追加、省略可）"
        required: false
        type: string

permissions:
  contents: read

jobs:
  add-items:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PROJECT_PAT }}
      PROJECT_OWNER: ${{ github.repository_owner }}
      PROJECT_NUMBER: ${{ inputs.project_number }}
      PROJECT_PAT: ${{ secrets.PROJECT_PAT }}
    # 前提: ubuntu-latest には gh (GitHub CLI) と jq がプリインストール済み
    # スクリプト内の require_command チェックはローカル実行時の UX 向上目的で残している
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Issue/PR を Project に追加
        if: ${{ startsWith(env.PROJECT_PAT, 'ghp_') || startsWith(env.PROJECT_PAT, 'github_pat_') }}
        env:
          TARGET_REPO: ${{ inputs.target_repo }}
          ITEM_TYPE: ${{ inputs.item_type }}
          ITEM_STATE: ${{ inputs.item_state }}
          ITEM_LABEL: ${{ inputs.item_label }}
        run: |
          # トリム（前後の空白のみ削除、内部空白は保持）
          TARGET_REPO="$(echo "$TARGET_REPO" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          ITEM_LABEL="$(echo "$ITEM_LABEL" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          bash scripts/add-items-to-project.sh

  workflow-summary-failure:
    needs: [add-items]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: 失敗サマリーを出力
        uses: ./.github/actions/workflow-summary
        with:
          status: failure
          project-owner: ${{ github.repository_owner }}
          project-number: ${{ inputs.project_number }}
          job-results: |
            {"add-items": "${{ needs.add-items.result }}"}

  workflow-summary-success:
    needs: [add-items]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: 成功サマリーを出力
        uses: ./.github/actions/workflow-summary
        with:
          status: success
          project-owner: ${{ github.repository_owner }}
          project-number: ${{ inputs.project_number }}
          job-results: |
            {"add-items": "${{ needs.add-items.result }}"}
