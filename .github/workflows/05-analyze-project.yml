name: "⑤ 統合プロジェクト分析"

on:
  workflow_dispatch:
    inputs:
      project_number:
        description: "Project の Number"
        required: true
        type: number
      report_types:
        description: "実行するレポート/機能タイプ（all: 全機能, stale: 滞留検知, summary: サマリー, effort: 工数集計, export: アイテムエクスポート）"
        required: false
        type: choice
        default: "all"
        options:
          - all
          - stale
          - summary
          - effort
          - export
      output_format:
        description: "出力形式"
        required: false
        type: choice
        default: "json"
        options:
          - json
          - markdown
          - csv
          - tsv
      item_type:
        description: "対象アイテムの種別"
        required: false
        type: choice
        default: "all"
        options:
          - all
          - issues
          - prs
      item_state:
        description: "対象アイテムの状態（open / closed / all）"
        required: false
        type: choice
        default: "all"
        options:
          - all
          - open
          - closed

permissions:
  contents: read

jobs:
  generate-summary-report:
    if: >-
      inputs.report_types == 'all' || inputs.report_types == 'summary'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PROJECT_PAT }}
      PROJECT_OWNER: ${{ github.repository_owner }}
      PROJECT_NUMBER: ${{ inputs.project_number }}
      OUTPUT_FORMAT: ${{ inputs.output_format }}
      ITEM_TYPE: ${{ inputs.item_type }}
      ITEM_STATE: ${{ inputs.item_state }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: サマリーレポート生成
        run: |
          chmod +x scripts/generate-summary-report.sh
          bash scripts/generate-summary-report.sh

      - name: アーティファクトをアップロード
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: summary-report-${{ inputs.project_number }}
          path: report-*-summary.*
          if-no-files-found: ignore
          retention-days: 90

  generate-effort-report:
    if: >-
      inputs.report_types == 'all' || inputs.report_types == 'effort'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PROJECT_PAT }}
      PROJECT_OWNER: ${{ github.repository_owner }}
      PROJECT_NUMBER: ${{ inputs.project_number }}
      OUTPUT_FORMAT: ${{ inputs.output_format }}
      ITEM_TYPE: ${{ inputs.item_type }}
      ITEM_STATE: ${{ inputs.item_state }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: 工数集計レポート生成
        run: |
          chmod +x scripts/generate-effort-report.sh
          bash scripts/generate-effort-report.sh

      - name: アーティファクトをアップロード
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: effort-report-${{ inputs.project_number }}
          path: report-*-effort.*
          if-no-files-found: ignore
          retention-days: 90

  detect-stale-items:
    if: >-
      inputs.report_types == 'all' || inputs.report_types == 'stale'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PROJECT_PAT }}
      PROJECT_OWNER: ${{ github.repository_owner }}
      PROJECT_NUMBER: ${{ inputs.project_number }}
      OUTPUT_FORMAT: ${{ inputs.output_format }}
      ITEM_TYPE: ${{ inputs.item_type }}
      ITEM_STATE: ${{ inputs.item_state }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: 滞留アイテム検知
        run: |
          chmod +x scripts/detect-stale-items.sh
          bash scripts/detect-stale-items.sh

      - name: アーティファクトをアップロード
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: stale-items-report
          path: stale-items-report.*
          if-no-files-found: ignore
          retention-days: 7

  export-items:
    if: >-
      inputs.report_types == 'all' || inputs.report_types == 'export'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PROJECT_PAT }}
      PROJECT_OWNER: ${{ github.repository_owner }}
      PROJECT_NUMBER: ${{ inputs.project_number }}
      OUTPUT_FORMAT: ${{ inputs.output_format }}
      ITEM_TYPE: ${{ inputs.item_type }}
      ITEM_STATE: ${{ inputs.item_state }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Project アイテムをエクスポート
        run: |
          chmod +x scripts/export-project-items.sh
          bash scripts/export-project-items.sh

      - name: アーティファクトをアップロード
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: export-items-${{ inputs.project_number }}
          path: export-*
          if-no-files-found: ignore
          retention-days: 7

  workflow-summary-failure:
    needs: [generate-summary-report, generate-effort-report, detect-stale-items, export-items]
    if: always() && contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: 失敗サマリーを出力
        uses: ./.github/actions/workflow-summary
        with:
          status: failure
          project-owner: ${{ github.repository_owner }}
          project-number: ${{ inputs.project_number }}
          job-results: |
            {"generate-summary-report": "${{ needs.generate-summary-report.result }}", "generate-effort-report": "${{ needs.generate-effort-report.result }}", "detect-stale-items": "${{ needs.detect-stale-items.result }}", "export-items": "${{ needs.export-items.result }}"}

  workflow-summary-success:
    needs: [generate-summary-report, generate-effort-report, detect-stale-items, export-items]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: 成功サマリーを出力
        uses: ./.github/actions/workflow-summary
        with:
          status: success
          project-owner: ${{ github.repository_owner }}
          project-number: ${{ inputs.project_number }}
          job-results: |
            {"generate-summary-report": "${{ needs.generate-summary-report.result }}", "generate-effort-report": "${{ needs.generate-effort-report.result }}", "detect-stale-items": "${{ needs.detect-stale-items.result }}", "export-items": "${{ needs.export-items.result }}"}
