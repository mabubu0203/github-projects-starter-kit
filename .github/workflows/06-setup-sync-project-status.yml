name: "⑥ 🔄 ステータス自動同期セットアップ"

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "対象リポジトリ（owner/repo 形式）"
        required: true
        type: string
      project_number:
        description: "対象 Project の番号"
        required: true
        type: number

permissions:
  contents: read

jobs:
  setup-sync-project-status:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PROJECT_PAT }}
      TARGET_REPO: ${{ inputs.target_repo }}
      PROJECT_NUMBER: ${{ inputs.project_number }}
    # 前提: ubuntu-latest には gh (GitHub CLI) と jq がプリインストール済み
    # スクリプト内の require_command チェックはローカル実行時の UX 向上目的で残している
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: ステータス自動同期ワークフローをセットアップ
        run: |
          chmod +x scripts/setup-sync-project-status.sh
          bash scripts/setup-sync-project-status.sh

  workflow-summary-failure:
    needs: [setup-sync-project-status]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: 失敗サマリーを出力
        uses: ./.github/actions/workflow-summary
        with:
          status: failure
          project-owner: ${{ github.repository_owner }}
          project-number: ${{ inputs.project_number }}
          job-results: |
            {"setup-sync-project-status": "${{ needs.setup-sync-project-status.result }}"}

  workflow-summary-success:
    needs: [setup-sync-project-status]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: 成功サマリーを出力
        uses: ./.github/actions/workflow-summary
        with:
          status: success
          project-owner: ${{ github.repository_owner }}
          project-number: ${{ inputs.project_number }}
          job-results: |
            {"setup-sync-project-status": "${{ needs.setup-sync-project-status.result }}"}
