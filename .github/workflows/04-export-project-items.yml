name: "④ Project アイテム エクスポート"

on:
  workflow_dispatch:
    inputs:
      project_number:
        description: "対象 Project の Number"
        required: true
        type: number
      output_format:
        description: "出力形式"
        required: true
        type: choice
        options:
          - markdown
          - csv
          - tsv
          - json
        default: "markdown"
      item_type:
        description: "対象アイテムの種別"
        required: true
        type: choice
        options:
          - all
          - issues
          - prs
        default: "all"
      item_state:
        description: "取得するアイテムの状態"
        required: true
        type: choice
        options:
          - open
          - closed
          - all
        default: "all"

permissions:
  contents: read

jobs:
  export-items:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PROJECT_PAT }}
      PROJECT_OWNER: ${{ github.repository_owner }}
      PROJECT_NUMBER: ${{ inputs.project_number }}
    # 前提: ubuntu-latest には gh (GitHub CLI) と jq がプリインストール済み
    # スクリプト内の require_command チェックはローカル実行時の UX 向上目的で残している
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Project アイテムをエクスポート
        env:
          OUTPUT_FORMAT: ${{ inputs.output_format }}
          ITEM_TYPE: ${{ inputs.item_type }}
          ITEM_STATE: ${{ inputs.item_state }}
        run: |
          chmod +x scripts/export-project-items.sh
          bash scripts/export-project-items.sh

      - name: アーティファクトをアップロード
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: project-items-export
          path: export-*
          if-no-files-found: ignore
          retention-days: 7

  workflow-summary-failure:
    needs: [export-items]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: 失敗サマリーを出力
        uses: ./.github/actions/workflow-summary
        with:
          status: failure
          job-results: |
            {"export-items": "${{ needs.export-items.result }}"}

  workflow-summary-success:
    needs: [export-items]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: 成功サマリーを出力
        uses: ./.github/actions/workflow-summary
        with:
          status: success
          job-results: |
            {"export-items": "${{ needs.export-items.result }}"}
